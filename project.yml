name: CycleTracker
options:
  bundleIdPrefix: com.dq
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true
targets:
  CycleTracker:
    type: application
    platform: iOS
    sources:
      - CycleTracker
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dq.cycletracker
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
        ENABLE_USER_SCRIPT_SANDBOXING: YES
    info:
      path: CycleTracker/Info.plist
      properties:
        CFBundleDisplayName: 经期助手
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        ITSAppUsesNonExemptEncryption: false
schemes:
  CycleTracker:
    build:
      targets:
        CycleTracker: all
    archive:
      config: Release
