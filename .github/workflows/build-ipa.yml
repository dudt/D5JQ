name: Build unsigned IPA

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate app icon
        run: python3 Scripts/make_icon.py

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Archive (unsigned)
        run: |
          xcodebuild archive \
            -project CycleTracker.xcodeproj \
            -scheme CycleTracker \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/CycleTracker.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Package IPA
        run: |
          brew install ldid
          mkdir -p build/Payload
          cp -R "build/CycleTracker.xcarchive/Products/Applications/CycleTracker.app" build/Payload/
          # 伪签名嵌入 App Group entitlements，让自签工具（AltStore/Sideloadly/TrollStore）识别并保留
          ldid -SCycleWidget/CycleWidget.entitlements build/Payload/CycleTracker.app/PlugIns/CycleWidget.appex/CycleWidget
          ldid -SCycleTracker/CycleTracker.entitlements build/Payload/CycleTracker.app/CycleTracker
          cd build
          zip -qry CycleTracker.ipa Payload
          ls -lh CycleTracker.ipa

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CycleTracker-ipa
          path: build/CycleTracker.ipa

      - name: Release on tag
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/CycleTracker.ipa
